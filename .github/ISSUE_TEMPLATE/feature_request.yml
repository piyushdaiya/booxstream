name: Feature Request
description: Suggest a feature for BooxStream
labels: ["enhancement"]

body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: "What problem are you trying to solve?"
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "What would you like BooxStream to do?"
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any alternative approaches?"
    validations:
      required: false