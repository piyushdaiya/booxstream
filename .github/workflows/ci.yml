name: CI (Android + Go)

on:
  push:
    branches:
      - main
  pull_request: {}
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (tests, lint, apk) - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show Java + Gradle env
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew -version

      # IMPORTANT: override any org.gradle.java.home accidentally committed locally
      - name: Unit tests (:core)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :core:test --stacktrace

      - name: Unit tests (:app)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (:app)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble Debug APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ runner.os }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Lint report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-${{ runner.os }}
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
          if-no-files-found: warn

      - name: Upload Unit Test reports (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports-${{ runner.os }}
          path: |
            android/**/build/reports/tests/**
          if-no-files-found: warn

  go:
    name: Go (test, build, package) - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        goarch:
          - amd64
          - arm64
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      # Build + package on Linux/macOS
      - name: Build + package booxcpy (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist pkg

          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"

          go build -trimpath -ldflags="-s -w" -o "dist/${BIN}" .
          tar -czf "pkg/${BIN}.tar.gz" -C dist "${BIN}"

          ls -lh dist pkg

      # Build + package on Windows (no zip dependency)
      - name: Build + package booxcpy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          $zip = "booxcpy-$goos-$env:GOARCH.zip"

          New-Item -ItemType Directory -Force -Path dist,pkg | Out-Null

          # Build the exe explicitly (Go won't auto-append .exe if -o has no extension)
          go build -trimpath -ldflags="-s -w" -o ("dist\" + $bin) .

          Compress-Archive -Path ("dist\" + $bin) -DestinationPath ("pkg\" + $zip) -Force

          Get-ChildItem dist
          Get-ChildItem pkg

      - name: Upload booxcpy binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-bin-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/dist/*
          if-no-files-found: error

      - name: Upload booxcpy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-pkg-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/pkg/*
          if-no-files-found: error