name: CI (Android + Go)

on:
  push:
    branches: [main]
  pull_request: {}
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (tests, lint, apk) - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show Java + Gradle env
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew -version

      # IMPORTANT: override any org.gradle.java.home accidentally committed locally
      - name: Unit tests (:core)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :core:test --stacktrace

      - name: Unit tests (:app)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (:app)
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble Debug APK
        env:
          ORG_GRADLE_PROJECT_org_gradle_java_home: ${{ env.JAVA_HOME }}
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Stash APK into workspace dist/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/dist/android/${{ runner.os }}"
          cp app/build/outputs/apk/debug/app-debug.apk \
            "${GITHUB_WORKSPACE}/dist/android/${{ runner.os }}/BooxStream-ci-debug.apk"
          ls -lh "${GITHUB_WORKSPACE}/dist/android/${{ runner.os }}"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ runner.os }}
          path: dist/android/${{ runner.os }}/*.apk
          if-no-files-found: error

      - name: Upload Lint report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-${{ runner.os }}
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
          if-no-files-found: warn

      - name: Upload Unit Test reports (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports-${{ runner.os }}
          path: android/**/build/reports/tests/**
          if-no-files-found: warn

  go:
    name: Go (test, build, package) - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      - name: Build + package booxcpy (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail

          OUTDIR="${GITHUB_WORKSPACE}/dist/go/${{ runner.os }}-${{ matrix.goarch }}"
          mkdir -p "${OUTDIR}"

          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"

          go build -trimpath -ldflags="-s -w" -o "${OUTDIR}/${BIN}" .
          (cd "${OUTDIR}" && tar -czf "${BIN}.tar.gz" "${BIN}" && rm -f "${BIN}")

          ls -lh "${OUTDIR}"

      - name: Build + package booxcpy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist\go\${{ runner.os }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          $zip = "booxcpy-$goos-$env:GOARCH.zip"

          go build -trimpath -ldflags="-s -w" -o (Join-Path $outDir $bin) .

          Compress-Archive -Path (Join-Path $outDir $bin) -DestinationPath (Join-Path $outDir $zip) -Force
          Remove-Item -Force (Join-Path $outDir $bin)

          Get-ChildItem $outDir

      - name: Upload booxcpy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-pkg-${{ runner.os }}-${{ matrix.goarch }}
          path: dist/go/${{ runner.os }}-${{ matrix.goarch }}/*
          if-no-files-found: error