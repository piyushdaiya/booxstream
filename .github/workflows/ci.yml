name: CI (Android + Go)

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (tests, lint, apk) - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        if: runner.os != 'Windows'
        run: chmod +x ./gradlew

      # ✅ Unit tests
      - name: Unit tests (:core)
        run: ./gradlew :core:test --stacktrace

      - name: Unit tests (:app)
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      # ✅ Lint
      - name: Lint (:app)
        run: ./gradlew :app:lintDebug --stacktrace

      # ✅ Build APK
      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ runner.os }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Lint report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-${{ runner.os }}
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
          if-no-files-found: warn

      - name: Upload Unit Test reports (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports-${{ runner.os }}
          path: |
            android/**/build/reports/tests/**
          if-no-files-found: warn


  go:
    name: Go (test, build, package) - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          # GitHub-hosted Windows runners do not support arm64 builds well for cross-compiling in all cases.
          # If you *want* to attempt it, remove this exclude.
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOOS: ${{ runner.os == 'Windows' && 'windows' || (runner.os == 'macOS' && 'darwin' || 'linux') }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      - name: Build + package booxcpy (tar.gz on unix, zip on windows)
        shell: bash
        env:
          GOOS: ${{ runner.os == 'Windows' && 'windows' || (runner.os == 'macOS' && 'darwin' || 'linux') }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p dist pkg

          BIN="booxcpy-${GOOS}-${GOARCH}"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then
            EXT=".exe"
          fi

          echo "Building ${BIN}${EXT}"
          go build -trimpath -ldflags="-s -w" -o "dist/${BIN}${EXT}" .

          # Package like scrcpy
          if [[ "${GOOS}" == "windows" ]]; then
            PKG="pkg/${BIN}.zip"
            (cd dist && zip -9 "../${PKG}" "${BIN}${EXT}")
          else
            PKG="pkg/${BIN}.tar.gz"
            (cd dist && tar -czf "../${PKG}" "${BIN}${EXT}")
          fi

          echo "Packaged: ${PKG}"
          ls -lh dist pkg

      - name: Upload booxcpy binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-bin-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/dist/*
          if-no-files-found: error

      - name: Upload booxcpy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-pkg-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/pkg/*
          if-no-files-found: error