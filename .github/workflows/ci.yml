name: CI (Android + Go)

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Android (tests, lint, apk) - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      # ✅ Fail fast if repo contains a local Android Studio Java home
      - name: Guard: no hardcoded org.gradle.java.home
        shell: bash
        run: |
          set -euo pipefail
          echo "Checking for org.gradle.java.home in repo..."
          if grep -R "org.gradle.java.home" -n . | grep -v "/build/" ; then
            echo "::error::Found org.gradle.java.home in repository. Remove it from gradle.properties (CI must use setup-java)."
            exit 1
          fi

      - name: Show Java + Gradle env
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew -version

      # ✅ Unit tests
      - name: Unit tests (:core)
        run: ./gradlew :core:test --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Unit tests (:app)
        run: ./gradlew :app:testDebugUnitTest --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      # ✅ Lint
      - name: Lint (:app)
        run: ./gradlew :app:lintDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      # ✅ Build APK
      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ runner.os }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Upload Lint report (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-lint-${{ runner.os }}
          path: |
            android/app/build/reports/lint-results-*.html
            android/app/build/reports/lint-results-*.xml
          if-no-files-found: warn

      - name: Upload Unit Test reports (optional)
        uses: actions/upload-artifact@v4
        with:
          name: android-test-reports-${{ runner.os }}
          path: |
            android/**/build/reports/tests/**
          if-no-files-found: warn

  go:
    name: Go (test, build, package) - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      # ✅ Unit tests
      - name: Go test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      # ✅ Build booxcpy (produces dist/booxcpy or dist/booxcpy.exe)
      - name: Build booxcpy
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p dist pkg
          go build -trimpath -ldflags="-s -w" -o dist/booxcpy .

      # ✅ Package on Linux/macOS -> tar.gz
      - name: Package booxcpy (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"
          mv dist/booxcpy "dist/${BIN}"
          tar -czf "pkg/${BIN}.tar.gz" -C dist "${BIN}"
          ls -lh dist pkg

      # ✅ Package on Windows -> zip (PowerShell, no zip dependency)
      - name: Package booxcpy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          New-Item -ItemType Directory -Force -Path dist,pkg | Out-Null
          Move-Item -Force dist\booxcpy.exe dist\$bin
          Compress-Archive -Path dist\$bin -DestinationPath pkg\("booxcpy-$goos-$env:GOARCH.zip") -Force
          Get-ChildItem dist,pkg

      - name: Upload booxcpy binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-bin-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/dist/*
          if-no-files-found: error

      - name: Upload booxcpy package artifact
        uses: actions/upload-artifact@v4
        with:
          name: booxcpy-pkg-${{ runner.os }}-${{ matrix.goarch }}
          path: host/booxcpy/pkg/*
          if-no-files-found: error