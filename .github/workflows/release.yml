name: Release (APK + booxcpy)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build APK - ubuntu
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      # ✅ Unit tests + lint on release too
      - name: Unit tests (:core)
        run: ./gradlew :core:test --stacktrace

      - name: Unit tests (:app)
        run: ./gradlew :app:testDebugUnitTest --stacktrace

      - name: Lint (:app)
        run: ./gradlew :app:lintDebug --stacktrace

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace

      - name: Stash APK
        run: |
          mkdir -p ../release-dist
          cp app/build/outputs/apk/debug/app-debug.apk ../release-dist/BooxStream-${{ github.ref_name }}-debug.apk
          ls -lh ../release-dist

      - name: Upload APK artifact (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/release-dist/*.apk
          if-no-files-found: error


  build-go:
    name: Build & package booxcpy - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOOS: ${{ runner.os == 'Windows' && 'windows' || (runner.os == 'macOS' && 'darwin' || 'linux') }}
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      - name: Build + package booxcpy
        shell: bash
        env:
          GOOS: ${{ runner.os == 'Windows' && 'windows' || (runner.os == 'macOS' && 'darwin' || 'linux') }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          mkdir -p ../../release-dist

          BIN="booxcpy-${GOOS}-${GOARCH}"
          EXT=""
          if [[ "${GOOS}" == "windows" ]]; then EXT=".exe"; fi

          go build -trimpath -ldflags="-s -w" -o "../../release-dist/${BIN}${EXT}" .

          # Package assets (scrcpy-style)
          if [[ "${GOOS}" == "windows" ]]; then
            (cd ../../release-dist && zip -9 "${BIN}.zip" "${BIN}${EXT}")
            rm -f "../../release-dist/${BIN}${EXT}"
          else
            (cd ../../release-dist && tar -czf "${BIN}.tar.gz" "${BIN}${EXT}")
            rm -f "../../release-dist/${BIN}${EXT}"
          fi

          ls -lh ../../release-dist

      - name: Upload booxcpy packages (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-booxcpy-${{ runner.os }}-${{ matrix.goarch }}
          path: host/release-dist/*
          if-no-files-found: error


  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-go]

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist

      - name: Download booxcpy artifacts (all)
        uses: actions/download-artifact@v4
        with:
          pattern: release-booxcpy-*
          merge-multiple: true
          path: dist

      - name: List dist
        run: ls -lh dist

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true