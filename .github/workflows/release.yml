name: Release (APK + booxcpy)

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-android:
    name: Build APK - ubuntu
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show Java + Gradle env
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew -version

      # ✅ Unit tests + lint
      - name: Unit tests (:core)
        run: ./gradlew :core:test --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Unit tests (:app)
        run: ./gradlew :app:testDebugUnitTest --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Lint (:app)
        run: ./gradlew :app:lintDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Stash APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p ../release-dist
          cp app/build/outputs/apk/debug/app-debug.apk ../release-dist/BooxStream-${{ github.ref_name }}-debug.apk
          ls -lh ../release-dist

      - name: Upload APK artifact (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: android/release-dist/*.apk
          if-no-files-found: error

  build-go:
    name: Build & package booxcpy - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      - name: Build booxcpy
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../../release-dist
          go build -trimpath -ldflags="-s -w" -o ../../release-dist/booxcpy .

      - name: Package booxcpy (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"
          mv ../../release-dist/booxcpy "../../release-dist/${BIN}"
          (cd ../../release-dist && tar -czf "${BIN}.tar.gz" "${BIN}")
          rm -f "../../release-dist/${BIN}"
          ls -lh ../../release-dist

      - name: Package booxcpy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
        run: |
          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          if (!(Test-Path "..\..\release-dist")) { New-Item -ItemType Directory -Force -Path "..\..\release-dist" | Out-Null }
          Move-Item -Force ..\..\release-dist\booxcpy.exe ..\..\release-dist\$bin
          Compress-Archive -Path ..\..\release-dist\$bin -DestinationPath ..\..\release-dist\("booxcpy-$goos-$env:GOARCH.zip") -Force
          Remove-Item -Force ..\..\release-dist\$bin
          Get-ChildItem ..\..\release-dist

      - name: Upload booxcpy packages (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-booxcpy-${{ runner.os }}-${{ matrix.goarch }}
          path: host/release-dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-go]

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist

      - name: Download booxcpy artifacts (all)
        uses: actions/download-artifact@v4
        with:
          pattern: release-booxcpy-*
          merge-multiple: true
          path: dist

      - name: List dist
        run: ls -lh dist

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true