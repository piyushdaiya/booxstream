name: Release (APK + booxcpy)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

# Default: no permissions. Grant per-job.
permissions: {}

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  # Helpful for repeatability
  TZ: UTC
  LC_ALL: C
  LANG: C

jobs:
  build-android:
    name: Android (release APK) - ubuntu
    runs-on: ubuntu-latest

    permissions:
      contents: read

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout (tag for workflow_dispatch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      # ✅ Decode keystore safely into RUNNER_TEMP (won't pollute repo workspace)
      - name: Prepare Android signing keystore (optional)
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail

          if [[ -z "${ANDROID_KEYSTORE_BASE64:-}" ]]; then
            echo "No ANDROID_KEYSTORE_BASE64 secret found; release APK will be unsigned."
            exit 0
          fi

          KEYSTORE_PATH="$RUNNER_TEMP/booxstream-release.keystore"
          printf "%s" "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_PATH"
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_PATH" >> "$GITHUB_ENV"
          echo "Keystore prepared."

      - name: Build + test + lint + assembleRelease
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          ./gradlew \
            :core:test \
            :app:testDebugUnitTest \
            :app:lintDebug \
            :app:assembleRelease \
            --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Verify APK signature (optional)
        shell: bash
        run: |
          set -euo pipefail
          APK="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$APK" ]]; then
            APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi

          if [[ ! -f "$APK" ]]; then
            echo "::error::No release APK found."
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          echo "Verifying: $APK"
          "$JAVA_HOME/bin/jarsigner" -verify -verbose -certs "$APK" | head -n 80 || true

      - name: Collect Release APK
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/dist"

          # Prefer signed
          APK="app/build/outputs/apk/release/app-release.apk"
          if [[ ! -f "$APK" ]]; then
            APK="app/build/outputs/apk/release/app-release-unsigned.apk"
          fi

          if [[ ! -f "$APK" ]]; then
            echo "::error::Release APK not found."
            ls -R app/build/outputs/apk || true
            exit 1
          fi

          cp "$APK" "${GITHUB_WORKSPACE}/dist/BooxStream-${RELEASE_TAG}-release.apk"
          ls -lh "${GITHUB_WORKSPACE}/dist"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-android
          path: ${{ github.workspace }}/dist/*.apk
          if-no-files-found: error

  build-go:
    name: Go (booxcpy) - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout (tag for workflow_dispatch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Tip: if you want stronger reproducibility, pin to an exact version like "1.23.4"
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      # Deterministic build flags:
      # -trimpath removes local paths
      # -buildvcs=false avoids embedding VCS info that can vary
      # -ldflags "-s -w" strips debug info (optional)
      - name: Build + package (Linux/macOS) deterministic tar.gz
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          OUT="${GITHUB_WORKSPACE}/dist"
          mkdir -p "$OUT"

          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"

          go build -trimpath -buildvcs=false -ldflags="-s -w" -o "$OUT/${BIN}" .

          # Deterministic tar.gz:
          # - fixed mtime
          # - stable owner/group
          # - sorted entries
          TAR="${OUT}/${BIN}.tar.gz"
          tar --sort=name --owner=0 --group=0 --numeric-owner \
              --mtime='UTC 1970-01-01' \
              -czf "$TAR" -C "$OUT" "$BIN"

          rm -f "$OUT/$BIN"
          ls -lh "$OUT"

      - name: Build + package (Windows) zip (stable)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          $out = Join-Path $env:GITHUB_WORKSPACE "dist"
          New-Item -ItemType Directory -Force -Path $out | Out-Null

          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          $zip = "booxcpy-$goos-$env:GOARCH.zip"

          go build -trimpath -buildvcs=false -ldflags="-s -w" -o (Join-Path $out $bin) .

          # Compress-Archive is OK, but zip metadata can vary slightly.
          # This is "good enough" in CI; for strict zip determinism you'd use a dedicated deterministic zip tool.
          Compress-Archive -Path (Join-Path $out $bin) -DestinationPath (Join-Path $out $zip) -Force
          Remove-Item -Force (Join-Path $out $bin)

          Get-ChildItem $out

      - name: Upload Go artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-go-${{ runner.os }}-${{ matrix.goarch }}
          path: ${{ github.workspace }}/dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-go]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    permissions:
      contents: write
      # Needed for build provenance attestations
      id-token: write
      attestations: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v8
        with:
          name: release-android
          path: dist

      - name: Download Go artifacts (all)
        uses: actions/download-artifact@v8
        with:
          pattern: release-go-*
          merge-multiple: true
          path: dist

      - name: List dist
        run: ls -lh dist

      - name: Generate SHA256SUMS (deterministic)
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          # deterministic ordering
          ls -1 | sort | xargs -I{} sha256sum "{}" > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Optional but "GitHub-grade": produce an SBOM for the release folder
      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: dist
          format: spdx-json
          output-file: dist/SBOM.spdx.json

      # SLSA-style build provenance attestation for the final artifacts we publish
      - name: Attest build provenance (release assets)
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: "dist/*"

      - name: Create GitHub Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true