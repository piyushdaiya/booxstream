name: Release (APK + booxcpy)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
  cancel-in-progress: false

env:
  # Unified tag value for both tag-push and manual runs
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  build-android:
    name: Build APK - ubuntu
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: android

    steps:
      - name: Checkout (tag for workflow_dispatch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up JDK (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Gradle wrapper executable
        run: chmod +x ./gradlew

      - name: Show Java + Gradle env
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          ./gradlew -version

      - name: Unit tests (:core)
        run: ./gradlew :core:test --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Unit tests (:app)
        run: ./gradlew :app:testDebugUnitTest --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Lint (:app)
        run: ./gradlew :app:lintDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Assemble Debug APK
        run: ./gradlew :app:assembleDebug --stacktrace -Dorg.gradle.java.home="$JAVA_HOME"

      - name: Stash APK into workspace dist/
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${GITHUB_WORKSPACE}/dist"
          cp app/build/outputs/apk/debug/app-debug.apk \
            "${GITHUB_WORKSPACE}/dist/BooxStream-${RELEASE_TAG}-debug.apk"
          ls -lh "${GITHUB_WORKSPACE}/dist"

      - name: Upload APK artifact (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: ${{ github.workspace }}/dist/*.apk
          if-no-files-found: error

  build-go:
    name: Build & package booxcpy - ${{ matrix.os }} / ${{ matrix.goarch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        goarch: [amd64, arm64]
        exclude:
          - os: windows-latest
            goarch: arm64

    defaults:
      run:
        working-directory: host/booxcpy

    steps:
      - name: Checkout (tag for workflow_dispatch)
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: host/booxcpy/go.sum

      - name: Go test
        env:
          GOARCH: ${{ matrix.goarch }}
        run: go test ./... -v

      - name: Build + package booxcpy (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          set -euo pipefail
          OUTDIR="${GITHUB_WORKSPACE}/dist/go/${{ runner.os }}-${{ matrix.goarch }}"
          mkdir -p "${OUTDIR}"

          GOOS="$(go env GOOS)"
          BIN="booxcpy-${GOOS}-${GOARCH}"

          go build -trimpath -ldflags="-s -w" -o "${OUTDIR}/${BIN}" .
          (cd "${OUTDIR}" && tar -czf "${BIN}.tar.gz" "${BIN}" && rm -f "${BIN}")
          ls -lh "${OUTDIR}"

      - name: Build + package booxcpy (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          $outDir = Join-Path $env:GITHUB_WORKSPACE "dist\go\${{ runner.os }}-${{ matrix.goarch }}"
          New-Item -ItemType Directory -Force -Path $outDir | Out-Null

          $goos = (go env GOOS)
          $bin = "booxcpy-$goos-$env:GOARCH.exe"
          $zip = "booxcpy-$goos-$env:GOARCH.zip"

          go build -trimpath -ldflags="-s -w" -o (Join-Path $outDir $bin) .

          Compress-Archive -Path (Join-Path $outDir $bin) -DestinationPath (Join-Path $outDir $zip) -Force
          Remove-Item -Force (Join-Path $outDir $bin)

          Get-ChildItem $outDir

      - name: Upload booxcpy packages (for publish job)
        uses: actions/upload-artifact@v4
        with:
          name: release-booxcpy-${{ runner.os }}-${{ matrix.goarch }}
          path: ${{ github.workspace }}/dist/go/${{ runner.os }}-${{ matrix.goarch }}/*
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-go]

    # Only publish when we have a tag (real tag push) or manual run with input tag
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Download APK artifact
        uses: actions/download-artifact@v4
        with:
          name: release-apk
          path: dist

      - name: Download booxcpy artifacts (all)
        uses: actions/download-artifact@v4
        with:
          pattern: release-booxcpy-*
          merge-multiple: true
          path: dist

      - name: List dist
        run: ls -lh dist

      - name: Create Release + Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          files: dist/*
          generate_release_notes: true